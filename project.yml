name: Ambit
options:
  bundleIdPrefix: com.winston
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Ambit:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Ambit
    resources:
      - path: Sources/Ambit/Resources
    info:
      path: Sources/Ambit/Info.plist
      properties:
        CFBundleDisplayName: Ambit
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Zodiak-Bold.otf
          - PlusJakartaSans-Regular.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.winston.ambit
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
        ENABLE_PREVIEWS: YES
schemes:
  Ambit:
    build:
      targets:
        Ambit: all
    run:
      config: Debug
    archive:
      config: Release
